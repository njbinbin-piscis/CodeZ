name: Release

# Build desktop bundles for Windows, Linux, and macOS (x86_64 + aarch64)
# and attach them to a draft GitHub release. Triggered by pushing a version
# tag (e.g. v0.1.0) or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # The frontend (mermaid / monaco / katex) needs more than Node's default
  # ~2 GB heap to bundle, otherwise `vite build` OOMs (exit 134) during the
  # tauri-action beforeBuildCommand.
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ── Linux (x86_64) ────────────────────────────────────────────────
  bundle-linux-x86_64:
    name: Bundle Linux x86_64 (.deb + AppImage)
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-linux-x86_64-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ── Linux (aarch64 / ARM64) ───────────────────────────────────────
  bundle-linux-aarch64:
    name: Bundle Linux aarch64 (.deb + AppImage)
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            qemu-user-static

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__ (ARM64)"
          releaseDraft: true
          prerelease: false
          args: "--target aarch64-unknown-linux-gnu"

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-linux-aarch64-bundles
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ── Windows (x86_64) ─────────────────────────────────────────────
  bundle-windows-x86_64:
    name: Bundle Windows x86_64 (.msi + .exe)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-windows-x86_64-bundles
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── Windows (aarch64 / ARM64) ────────────────────────────────────
  bundle-windows-aarch64:
    name: Bundle Windows aarch64 (.msi + .exe)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__ (ARM64)"
          releaseDraft: true
          prerelease: false
          args: "--target aarch64-pc-windows-msvc"

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-windows-aarch64-bundles
          path: |
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── macOS (x86_64 / Intel) ───────────────────────────────────────
  bundle-macos-x86_64:
    name: Bundle macOS x86_64 (.dmg + .app)
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-macos-x86_64-bundles
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  # ── macOS (aarch64 / Apple Silicon) ──────────────────────────────
  bundle-macos-aarch64:
    name: Bundle macOS aarch64 (.dmg + .app)
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__ (Apple Silicon)"
          releaseDraft: true
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-macos-aarch64-bundles
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  # ── macOS Universal (x86_64 + aarch64 in one .dmg) ───────────────
  # Runs on Apple Silicon and bundles a single universal2 installer that
  # natively supports both Intel and Apple Silicon (M-series) Macs.
  bundle-macos-universal:
    name: Bundle macOS Universal (.dmg + .app)
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle universal2 with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__ (Universal)"
          releaseDraft: true
          prerelease: false
          args: "--target universal-apple-darwin"

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-macos-universal-bundles
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
