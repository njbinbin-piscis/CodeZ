name: Release

# Build the desktop bundles (Linux .deb + AppImage) and attach them to a draft
# GitHub release. Triggered by pushing a version tag (e.g. v0.1.0) or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bundle:
    name: Bundle (Linux deb + AppImage)
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Reads the version from src-tauri/tauri.conf.json; works for both the
          # tag push and manual dispatch.
          tagName: codez-v__VERSION__
          releaseName: "CodeZ v__VERSION__"
          releaseDraft: true
          prerelease: false
          # Linux produces .deb, .rpm and .AppImage under
          # src-tauri/target/release/bundle/.
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codez-linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
