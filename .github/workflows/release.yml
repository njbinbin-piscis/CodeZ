name: Release

# Build desktop bundles for Windows, Linux, and macOS (x86_64 + aarch64)
# and attach them to a GitHub release. Triggered by pushing a version tag
# (e.g. v0.1.0) or manually. Releases are published (not draft) so install
# packages are visible on the public Releases page.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Retry flaky crates.io downloads (HTTP2 reset / connection reset by peer).
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: false
  # The frontend (mermaid / monaco / katex) needs more than Node's default
  # ~2 GB heap to bundle, otherwise `vite build` OOMs (exit 134) during the
  # tauri-action beforeBuildCommand.
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ── Linux (x86_64) ────────────────────────────────────────────────
  bundle-linux-x86_64:
    name: Bundle Linux x86_64 (.deb + AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo fetch; then exit 0; fi
            echo "cargo fetch failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: v__VERSION__
          releaseName: "AgentZ v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentz-linux-x86_64-bundles
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ── Linux (aarch64 / ARM64) ───────────────────────────────────────
  # Native build on GitHub's ARM runner — cross-compiling glib/webkit from
  # x86_64 requires a full sysroot and breaks pkg-config without it.
  bundle-linux-aarch64:
    name: Bundle Linux aarch64 (.deb + AppImage)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo fetch; then exit 0; fi
            echo "cargo fetch failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: v__VERSION__
          releaseName: "AgentZ v__VERSION__ (ARM64 Linux)"
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentz-linux-aarch64-bundles
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ── Windows (x86_64) ─────────────────────────────────────────────
  bundle-windows-x86_64:
    name: Bundle Windows x86_64 (.msi + .exe)
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo fetch; then exit 0; fi
            echo "cargo fetch failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: v__VERSION__
          releaseName: "AgentZ v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentz-windows-x86_64-bundles
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── Windows (aarch64 / ARM64) ────────────────────────────────────
  # Native build on GitHub's Windows ARM runner (Snapdragon / ARM64 PCs).
  bundle-windows-aarch64:
    name: Bundle Windows aarch64 (.msi + .exe)
    runs-on: windows-11-arm
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo fetch; then exit 0; fi
            echo "cargo fetch failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: v__VERSION__
          releaseName: "AgentZ v__VERSION__ (ARM64 Windows)"
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentz-windows-aarch64-bundles
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ── macOS (x86_64 / Intel) ───────────────────────────────────────
  # Disabled: macos-13 runners are often unavailable (workflow stuck queued).
  # Use bundle-macos-universal instead (Intel + Apple Silicon in one .dmg).

  # ── macOS (aarch64 / Apple Silicon) ──────────────────────────────
  bundle-macos-aarch64:
    name: Bundle macOS aarch64 (.dmg + .app)
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo fetch; then exit 0; fi
            echo "cargo fetch failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build + bundle with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: v__VERSION__
          releaseName: "AgentZ v__VERSION__ (Apple Silicon)"
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentz-macos-aarch64-bundles
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
          if-no-files-found: warn

  # ── macOS Universal (x86_64 + aarch64 in one .dmg) ───────────────
  # Runs on Apple Silicon and bundles a single universal2 installer that
  # natively supports both Intel and Apple Silicon (M-series) Macs.
  bundle-macos-universal:
    name: Bundle macOS Universal (.dmg + .app)
    runs-on: macos-14
    timeout-minutes: 150
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Prefetch Cargo dependencies
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo fetch; then exit 0; fi
            echo "cargo fetch failed (attempt ${attempt}), retrying..."
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build + bundle universal2 with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: v__VERSION__
          releaseName: "AgentZ v__VERSION__ (Universal)"
          releaseDraft: false
          prerelease: false
          args: "--target universal-apple-darwin"

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentz-macos-universal-bundles
          path: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
