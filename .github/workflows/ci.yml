name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: false
  RUST_BACKTRACE: 1
  # `vite build` of the heavy frontend (mermaid / monaco / katex) OOMs under
  # Node's default ~2 GB heap; give it more headroom.
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:exthost
      - run: npm --prefix extension-host run smoke
      - run: npm run build

  rust:
    name: Desktop host (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:exthost
      - run: npm run build
      - name: cargo clippy (workspace, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test (workspace)
        run: cargo test --workspace
